    name: "Reliability and Recovery"
    items:
      - Stale-task reassignment policy hardening
      - Idempotent report dedupe by task+commit
      - Event retention/compaction with cursor safety

  - version: v0.6.0
    name: "Multi-Project Operations"
    items:
      - Project registry and context switching
      - Cross-project status/reporting view
      - Per-project override model

